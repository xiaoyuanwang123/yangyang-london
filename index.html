<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>欢迎阳阳来敦儿 🇬🇧</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --pink-50: #fff0f5;
  --pink-100: #ffd6e7;
  --pink-200: #ffb3ce;
  --pink-300: #ff85b3;
  --pink-400: #e8668f;
  --pink-500: #c9476f;
  --blush: #f7e4ed;
  --cream: #fffaf8;
  --bow: #d4739a;
  --bow-dark: #b05580;
  --text: #5a3245;
  --text-light: #9a6f83;
  --white: #ffffff;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Nunito', sans-serif;
  background: var(--cream);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── Decorative BG ── */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(circle at 10% 20%, rgba(255,182,193,0.18) 0%, transparent 40%),
    radial-gradient(circle at 90% 80%, rgba(255,182,193,0.15) 0%, transparent 40%),
    radial-gradient(circle at 50% 50%, rgba(247,228,237,0.3) 0%, transparent 70%);
  pointer-events: none;
  z-index: 0;
}

/* Floating hearts */
.floating-hearts {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
  overflow: hidden;
}

.heart {
  position: absolute;
  opacity: 0;
  animation: floatHeart linear infinite;
  font-size: 14px;
}

@keyframes floatHeart {
  0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
  10% { opacity: 0.4; }
  90% { opacity: 0.2; }
  100% { transform: translateY(-100px) rotate(360deg); opacity: 0; }
}

.wrapper {
  position: relative;
  z-index: 1;
  max-width: 520px;
  margin: 0 auto;
  padding: 0 16px 60px;
}

/* ── COVER ── */
.cover {
  text-align: center;
  padding: 48px 24px 40px;
  position: relative;
}

.cover-cat {
  margin: 0 auto 20px;
  width: 140px;
  height: 140px;
  position: relative;
}

/* SVG cat embedded */
.cover-title {
  font-family: 'Playfair Display', serif;
  font-size: 26px;
  font-weight: 600;
  color: var(--text);
  line-height: 1.3;
  margin-bottom: 8px;
}

.cover-subtitle {
  font-size: 14px;
  color: var(--text-light);
  font-weight: 400;
}

.paw-divider {
  margin: 18px auto;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  color: var(--pink-300);
  font-size: 13px;
  letter-spacing: 2px;
}

/* ── CARDS ── */
.card {
  background: var(--white);
  border-radius: 20px;
  border: 1.5px solid var(--pink-100);
  padding: 20px;
  margin-bottom: 16px;
  box-shadow: 0 4px 20px rgba(200,100,140,0.07);
  transition: box-shadow 0.2s;
}

.card:hover { box-shadow: 0 6px 28px rgba(200,100,140,0.12); }

.card-title {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 15px;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 14px;
}

.card-title .icon-badge {
  width: 30px; height: 30px;
  background: var(--pink-100);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 15px;
}

/* ── DATE INPUT ── */
.date-row {
  display: flex;
  gap: 10px;
  align-items: center;
  flex-wrap: wrap;
}

.date-input-wrap {
  flex: 1;
  min-width: 140px;
  position: relative;
}

.date-input-wrap input[type="date"] {
  width: 100%;
  padding: 10px 14px;
  border: 1.5px solid var(--pink-200);
  border-radius: 12px;
  font-family: 'Nunito', sans-serif;
  font-size: 13px;
  color: var(--text);
  background: var(--pink-50);
  outline: none;
  transition: border 0.2s;
  cursor: pointer;
}

.date-input-wrap input[type="date"]:focus {
  border-color: var(--bow);
}

.btn-weather {
  background: linear-gradient(135deg, var(--bow), var(--pink-400));
  color: white;
  border: none;
  border-radius: 12px;
  padding: 10px 16px;
  font-family: 'Nunito', sans-serif;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  white-space: nowrap;
  transition: all 0.2s;
  box-shadow: 0 3px 10px rgba(180,80,120,0.25);
}

.btn-weather:hover { transform: translateY(-1px); box-shadow: 0 5px 15px rgba(180,80,120,0.3); }

.weather-result {
  margin-top: 12px;
  padding: 12px 16px;
  background: var(--blush);
  border-radius: 12px;
  font-size: 13px;
  color: var(--text);
  display: none;
  line-height: 1.6;
}

.weather-result.show { display: block; animation: fadeIn 0.3s ease; }

/* ── QUESTIONS ── */
.step-bar {
  display: flex;
  gap: 5px;
  margin-bottom: 18px;
  align-items: center;
  justify-content: center;
}

.step-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--pink-100);
  transition: all 0.3s;
}

.step-dot.active { background: var(--bow); transform: scale(1.4); }
.step-dot.done { background: var(--pink-300); }

.q-label-pill {
  display: inline-block;
  background: var(--pink-100);
  color: var(--bow-dark);
  font-size: 10px;
  font-weight: 700;
  padding: 3px 10px;
  border-radius: 20px;
  letter-spacing: 0.5px;
  margin-bottom: 8px;
  text-transform: uppercase;
}

.q-text {
  font-family: 'Playfair Display', serif;
  font-size: 18px;
  color: var(--text);
  margin-bottom: 14px;
  line-height: 1.4;
}

.q-hint {
  font-size: 11px;
  color: var(--text-light);
  margin-bottom: 12px;
}

.options-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 9px;
}

.options-grid.single-col { grid-template-columns: 1fr; }

.opt-btn {
  background: var(--pink-50);
  border: 1.5px solid var(--pink-100);
  border-radius: 14px;
  padding: 12px 12px;
  cursor: pointer;
  text-align: left;
  transition: all 0.2s;
  display: flex;
  flex-direction: column;
  gap: 3px;
  position: relative;
  overflow: hidden;
}

.opt-btn::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, rgba(255,255,255,0.6), transparent);
  pointer-events: none;
}

.opt-btn:hover {
  border-color: var(--pink-300);
  background: var(--pink-100);
  transform: translateY(-2px);
  box-shadow: 0 4px 12px rgba(200,100,140,0.15);
}

.opt-btn.selected {
  border-color: var(--bow);
  background: linear-gradient(135deg, var(--pink-100), #ffdce8);
  box-shadow: 0 4px 14px rgba(180,80,120,0.2);
}

.opt-btn .o-icon {
  font-size: 22px;
  margin-bottom: 2px;
}

.opt-btn .o-name {
  font-size: 13px;
  font-weight: 700;
  color: var(--text);
}

.opt-btn .o-sub {
  font-size: 11px;
  color: var(--text-light);
  line-height: 1.3;
}

.opt-btn.selected .o-name { color: var(--bow-dark); }
.opt-btn.selected .o-sub { color: var(--bow); }

.check-mark {
  position: absolute;
  top: 8px; right: 8px;
  width: 16px; height: 16px;
  border-radius: 50%;
  background: var(--bow);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 1;
}

.check-mark svg { width: 9px; height: 9px; }
.opt-btn.selected .check-mark { display: flex; }

.nav-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 18px;
  gap: 10px;
}

.btn-back {
  background: transparent;
  border: 1.5px solid var(--pink-200);
  border-radius: 12px;
  padding: 10px 18px;
  font-family: 'Nunito', sans-serif;
  font-size: 13px;
  color: var(--text-light);
  cursor: pointer;
  transition: all 0.2s;
}

.btn-back:hover { background: var(--pink-50); color: var(--text); }

.btn-next {
  background: linear-gradient(135deg, var(--bow), var(--pink-400));
  color: white;
  border: none;
  border-radius: 12px;
  padding: 11px 28px;
  font-family: 'Nunito', sans-serif;
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.2s;
  box-shadow: 0 4px 12px rgba(180,80,120,0.3);
  margin-left: auto;
}

.btn-next:hover { transform: translateY(-1px); box-shadow: 0 6px 18px rgba(180,80,120,0.35); }
.btn-next:disabled { opacity: 0.4; cursor: not-allowed; transform: none; box-shadow: none; }

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

.screen { animation: fadeIn 0.35s ease forwards; }

/* ── ITINERARY ── */
.result-header {
  text-align: center;
  padding: 12px 0 20px;
}

.result-title {
  font-family: 'Playfair Display', serif;
  font-size: 22px;
  color: var(--text);
  margin-bottom: 8px;
}

.tag-chips {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  justify-content: center;
  margin: 10px 0;
}

.chip {
  background: var(--pink-100);
  color: var(--bow-dark);
  font-size: 11px;
  font-weight: 600;
  padding: 4px 12px;
  border-radius: 20px;
}

.stats-row {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
  margin: 16px 0;
}

.stat-box {
  background: var(--white);
  border: 1.5px solid var(--pink-100);
  border-radius: 14px;
  text-align: center;
  padding: 12px 8px;
}

.stat-box .sn {
  font-size: 22px;
  font-weight: 700;
  color: var(--bow);
  font-family: 'Playfair Display', serif;
}

.stat-box .sl {
  font-size: 10px;
  color: var(--text-light);
  margin-top: 2px;
}

/* Day cards */
.day-card {
  background: var(--white);
  border-radius: 18px;
  border: 1.5px solid var(--pink-100);
  overflow: hidden;
  margin-bottom: 12px;
  box-shadow: 0 3px 14px rgba(200,100,140,0.07);
}

.day-header {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 15px 16px;
  cursor: pointer;
  transition: background 0.2s;
  user-select: none;
}

.day-header:hover { background: var(--pink-50); }

.day-num-badge {
  width: 38px; height: 38px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--pink-200), var(--bow));
  color: white;
  font-weight: 700;
  font-size: 13px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  box-shadow: 0 2px 8px rgba(180,80,120,0.25);
}

.day-info { flex: 1; }

.day-name {
  font-family: 'Playfair Display', serif;
  font-size: 15px;
  color: var(--text);
}

.day-sub {
  font-size: 11px;
  color: var(--text-light);
  margin-top: 2px;
}

.day-arrow {
  color: var(--pink-300);
  font-size: 12px;
  transition: transform 0.3s;
}

.day-body {
  display: none;
  border-top: 1.5px solid var(--pink-50);
}

.day-body.open { display: block; }

/* Photo strip */
.photo-strip {
  display: flex;
  gap: 8px;
  padding: 12px 16px 4px;
  overflow-x: auto;
  scrollbar-width: none;
}

.photo-strip::-webkit-scrollbar { display: none; }

.photo-item {
  flex-shrink: 0;
  width: 90px;
  border-radius: 10px;
  overflow: hidden;
  border: 2px solid var(--pink-100);
}

.photo-item img {
  width: 90px;
  height: 70px;
  object-fit: cover;
  display: block;
}

.photo-item .photo-label {
  background: var(--pink-50);
  font-size: 9px;
  color: var(--text-light);
  padding: 3px 5px;
  text-align: center;
  font-weight: 600;
}

/* Activities */
.activity-item {
  display: flex;
  gap: 10px;
  padding: 13px 16px;
  border-bottom: 1px solid var(--pink-50);
}

.activity-item:last-child { border-bottom: none; }

.act-time {
  font-size: 11px;
  font-weight: 700;
  color: var(--text-light);
  min-width: 46px;
  padding-top: 2px;
  flex-shrink: 0;
}

.act-content { flex: 1; }

.act-name {
  font-size: 14px;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 3px;
}

.act-desc {
  font-size: 12px;
  color: var(--text-light);
  line-height: 1.55;
}

.act-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 5px;
  margin-top: 7px;
}

.tag {
  font-size: 10px;
  font-weight: 600;
  padding: 2px 9px;
  border-radius: 20px;
}

.t-free { background: #e8f5e9; color: #388e3c; }
.t-book { background: #fff3e0; color: #e65100; }
.t-food { background: #fce4ec; color: #c62828; }
.t-must { background: #f3e5f5; color: #6a1b9a; }
.t-ic { background: #e3f2fd; color: #0d47a1; }
.t-photo { background: #fce4ec; color: #ad1457; }

.act-link {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-size: 11px;
  color: var(--bow);
  text-decoration: none;
  margin-top: 5px;
  font-weight: 700;
}

.act-link:hover { text-decoration: underline; }

/* Restaurant section */
.restaurant-section {
  margin: 0 16px 14px;
  background: var(--blush);
  border-radius: 14px;
  padding: 14px;
}

.rest-title {
  font-size: 12px;
  font-weight: 700;
  color: var(--bow-dark);
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  gap: 5px;
}

.rest-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}

.rest-card {
  background: var(--white);
  border-radius: 12px;
  border: 1px solid var(--pink-100);
  padding: 10px 10px 8px;
}

.rest-name { font-size: 12px; font-weight: 700; color: var(--text); }
.rest-cuisine { font-size: 10px; color: var(--bow); font-weight: 600; margin: 2px 0; }
.rest-dish { font-size: 10px; color: var(--text-light); }
.rest-link { font-size: 10px; color: var(--bow); font-weight: 700; text-decoration: none; display: block; margin-top: 5px; }
.rest-link:hover { text-decoration: underline; }

/* Imperial College highlight */
.ic-banner {
  background: linear-gradient(135deg, #e3f2fd, #bbdefb);
  border: 1.5px solid #90caf9;
  border-radius: 14px;
  padding: 12px 14px;
  margin: 0 16px 12px;
  display: flex;
  align-items: center;
  gap: 10px;
}

.ic-icon { font-size: 26px; flex-shrink: 0; }

.ic-text { flex: 1; }
.ic-text .ic-name { font-size: 13px; font-weight: 700; color: #0d47a1; }
.ic-text .ic-sub { font-size: 11px; color: #1565c0; margin-top: 2px; }

/* Reset */
.btn-reset {
  display: block;
  margin: 20px auto 0;
  background: var(--pink-50);
  border: 1.5px solid var(--pink-200);
  border-radius: 12px;
  padding: 11px 28px;
  font-family: 'Nunito', sans-serif;
  font-size: 13px;
  color: var(--text-light);
  cursor: pointer;
  font-weight: 600;
  transition: all 0.2s;
}

.btn-reset:hover { background: var(--pink-100); color: var(--bow-dark); }

/* Progress bar */
.prog-wrap {
  height: 4px;
  background: var(--pink-100);
  border-radius: 2px;
  margin-bottom: 18px;
  overflow: hidden;
}

.prog-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--pink-300), var(--bow));
  border-radius: 2px;
  transition: width 0.4s ease;
}

/* Ribbon */
.ribbon {
  text-align: center;
  margin: 6px 0 14px;
}

.ribbon span {
  display: inline-block;
  background: linear-gradient(135deg, var(--bow), var(--pink-400));
  color: white;
  font-size: 11px;
  font-weight: 700;
  padding: 4px 16px;
  border-radius: 20px;
  letter-spacing: 0.5px;
}

/* Sparkle */
@keyframes sparkle {
  0%, 100% { opacity: 0.3; transform: scale(0.8); }
  50% { opacity: 1; transform: scale(1.2); }
}

.sparkle {
  display: inline-block;
  animation: sparkle 1.8s ease-in-out infinite;
}

.sparkle:nth-child(2) { animation-delay: 0.6s; }
.sparkle:nth-child(3) { animation-delay: 1.2s; }

</style>
</head>
<body>

<!-- Floating hearts background -->
<div class="floating-hearts" id="hearts"></div>

<div class="wrapper">

  <!-- COVER -->
  <div class="cover">
    <!-- Cute cat SVG (original design inspired by Marie aesthetic) -->
    <div class="cover-cat">
      <svg viewBox="0 0 140 140" xmlns="http://www.w3.org/2000/svg" width="140" height="140">
        <!-- Body -->
        <ellipse cx="70" cy="100" rx="32" ry="28" fill="#fff5f8" stroke="#e8a0b8" stroke-width="1.5"/>
        <!-- Head -->
        <circle cx="70" cy="64" r="30" fill="#fff5f8" stroke="#e8a0b8" stroke-width="1.5"/>
        <!-- Ears -->
        <polygon points="44,42 38,20 58,38" fill="#fff5f8" stroke="#e8a0b8" stroke-width="1.5"/>
        <polygon points="96,42 102,20 82,38" fill="#fff5f8" stroke="#e8a0b8" stroke-width="1.5"/>
        <!-- Ear inner -->
        <polygon points="46,40 41,24 57,38" fill="#f9c4d8"/>
        <polygon points="94,40 99,24 83,38" fill="#f9c4d8"/>
        <!-- Eyes -->
        <circle cx="60" cy="62" r="5.5" fill="#5a3245"/>
        <circle cx="80" cy="62" r="5.5" fill="#5a3245"/>
        <circle cx="61.5" cy="60.5" r="1.8" fill="white"/>
        <circle cx="81.5" cy="60.5" r="1.8" fill="white"/>
        <!-- Nose -->
        <ellipse cx="70" cy="71" rx="3.5" ry="2.5" fill="#f4a7c0"/>
        <!-- Mouth -->
        <path d="M66 74 Q70 78 74 74" fill="none" stroke="#e8a0b8" stroke-width="1.2" stroke-linecap="round"/>
        <!-- Whiskers -->
        <line x1="35" y1="68" x2="58" y2="70" stroke="#c9a0b8" stroke-width="0.8" opacity="0.7"/>
        <line x1="35" y1="72" x2="57" y2="72" stroke="#c9a0b8" stroke-width="0.8" opacity="0.7"/>
        <line x1="82" y1="70" x2="105" y2="68" stroke="#c9a0b8" stroke-width="0.8" opacity="0.7"/>
        <line x1="83" y1="72" x2="105" y2="72" stroke="#c9a0b8" stroke-width="0.8" opacity="0.7"/>
        <!-- Big bow -->
        <ellipse cx="70" cy="90" rx="22" ry="13" fill="#d4739a" opacity="0.95"/>
        <ellipse cx="70" cy="90" rx="22" ry="13" fill="none" stroke="#b05580" stroke-width="1"/>
        <!-- Bow left wing -->
        <path d="M48,90 Q36,78 40,86 Q36,94 48,90" fill="#c9466a" opacity="0.5"/>
        <!-- Bow right wing -->
        <path d="M92,90 Q104,78 100,86 Q104,94 92,90" fill="#c9466a" opacity="0.5"/>
        <!-- Bow center -->
        <ellipse cx="70" cy="90" rx="7" ry="7" fill="#e8809e"/>
        <!-- Head bow -->
        <g transform="translate(82,34) rotate(15)">
          <ellipse cx="0" cy="0" rx="10" ry="6" fill="#d4739a"/>
          <ellipse cx="-8" cy="-2" rx="7" ry="4" fill="#c9466a" opacity="0.7"/>
          <ellipse cx="8" cy="-2" rx="7" ry="4" fill="#c9466a" opacity="0.7"/>
          <circle cx="0" cy="0" r="3.5" fill="#e8809e"/>
        </g>
        <!-- Tail -->
        <path d="M100,115 Q120,105 115,90 Q110,80 105,88" fill="none" stroke="#e8a0b8" stroke-width="2.5" stroke-linecap="round"/>
        <!-- Paws -->
        <ellipse cx="54" cy="122" rx="10" ry="6" fill="#fff5f8" stroke="#e8a0b8" stroke-width="1.2"/>
        <ellipse cx="86" cy="122" rx="10" ry="6" fill="#fff5f8" stroke="#e8a0b8" stroke-width="1.2"/>
        <!-- Paw toes -->
        <circle cx="49" cy="121" r="2" fill="#f9c4d8"/>
        <circle cx="54" cy="120" r="2" fill="#f9c4d8"/>
        <circle cx="59" cy="121" r="2" fill="#f9c4d8"/>
        <circle cx="81" cy="121" r="2" fill="#f9c4d8"/>
        <circle cx="86" cy="120" r="2" fill="#f9c4d8"/>
        <circle cx="91" cy="121" r="2" fill="#f9c4d8"/>
      </svg>
    </div>

    <div class="cover-title">欢迎阳阳来敦儿 🇬🇧</div>
    <div class="cover-subtitle">为你量身定制的5日伦敦小公主之旅</div>

    <div class="paw-divider">
      <span class="sparkle">✦</span>
      <span>告诉我你的喜好，让我来规划</span>
      <span class="sparkle">✦</span>

let answers = {};
let step = 0;
const total = questions.length;

function renderDots(){
  const el = document.getElementById('stepBar');
  el.innerHTML = Array.from({length:total+1},(_,i)=>{
    let c='step-dot';
    if(i<step) c+=' done';
    else if(i===step) c+=' active';
    return `<div class="${c}"></div>`;
  }).join('');
  document.getElementById('progFill').style.width = (step/total*100)+'%';
}

function renderQ(idx){
  const q = questions[idx];
  const sel = answers[q.id] || (q.multi?[]:'');
  const optsHtml = q.options.map(o=>{
    const isSel = q.multi ? sel.includes(o.val) : sel===o.val;
    return `<button class="opt-btn${isSel?' selected':''}" onclick="pick('${q.id}','${o.val}',${q.multi})">
      <div class="check-mark"><svg viewBox="0 0 10 8" fill="none"><path d="M1 4l3 3 5-6" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
      <div class="o-icon">${o.icon}</div>
      <div class="o-name">${o.name}</div>
      <div class="o-sub">${o.sub}</div>
    </button>`;
  }).join('');

  const hasAns = q.multi ? (sel.length>0) : !!sel;
  const isLast = idx===total-1;

  document.getElementById('quizBody').innerHTML = `
    <div class="screen">
      <div class="q-label-pill">问题 ${idx+1} / ${total}${q.multi?' · 多选':''}</div>
      <div class="q-text">${q.text}</div>
      ${q.hint?`<div class="q-hint">💌 ${q.hint}</div>`:''}
      <div class="options-grid">${optsHtml}</div>
      <div class="nav-row">
        ${idx>0?'<button class="btn-back" onclick="goBack()">← 返回</button>':'<div></div>'}
        <button class="btn-next" id="nextBtn" onclick="goNext()" ${hasAns?'':'disabled'}>
          ${isLast?'生成我的行程 🎀':'下一题 →'}
        </button>
      </div>
    </div>
  `;
}

function pick(qId, val, multi){
  if(multi){
    if(!answers[qId]) answers[qId]=[];
    const i=answers[qId].indexOf(val);
    if(i>=0) answers[qId].splice(i,1);
    else answers[qId].push(val);
  } else {
    answers[qId]=val;
  }
  renderQ(step);
}

function goNext(){
  const q=questions[step];
  const has = q.multi?(answers[q.id]&&answers[q.id].length>0):!!answers[q.id];
  if(!has) return;
  step++;
  if(step>=total) buildItinerary();
  else { renderQ(step); renderDots(); }
}

function goBack(){
  if(step>0){ step--; renderQ(step); renderDots(); }
}

function buildItinerary(){
  document.getElementById('quizCard').style.display='none';

  const vibes=(answers.vibe||[]);
  const foods=(answers.food||[]);
  const budget=answers.budget||'mid';

  const vibeLabels={ culture:'文化探索', food:'美食体验', shopping:'购物达人', nature:'公园漫步', theatre:'音乐剧', photo:'拍照打卡' };
  const foodLabels={ british:'英式体验', asian:'亚洲美食', european:'欧洲风味', trendy:'网红轻食', fine:'豪华大餐', any:'随缘吃货' };
  const budgetLabel={ budget:'精打细算', mid:'适中舒适', premium:'品质优先', selective:'灵活出击' }[budget]||'适中舒适';

  const chips = [
    ...vibes.map(v=>vibeLabels[v]),
    ...foods.map(f=>foodLabels[f]),
    budgetLabel
  ].filter(Boolean).map(c=>`<span class="chip">${c}</span>`).join('');

  const daysHtml = DAYS.map((day, di)=>{
    const photosHtml = day.photos && day.photos.length>0 ? `
      <div class="photo-strip">
        ${day.photos.map(p=>`
          <div class="photo-item">
            <img src="${p.url}" alt="${p.label}" onerror="this.style.display='none'"/>
            <div class="photo-label">${p.label}</div>
          </div>
        `).join('')}
      </div>
    ` : '';

    const icBanner = day.isIC ? `
      <div class="ic-banner">
        <div class="ic-icon">🎓</div>
        <div class="ic-text">
          <div class="ic-name">帝国理工学院 固定行程</div>
          <div class="ic-sub">我的学校！带你参观南肯校区，感受一下 ~</div>
        </div>
      </div>
    ` : '';

    const actsHtml = day.activities.map(a=>{
      const tagHtml=(a.tags||[]).map(t=>{
        const map={free:['t-free','免费'],book:['t-book','需预约'],food:['t-food','美食'],must:['t-must','强推'],ic:['t-ic','帝国理工'],photo:['t-photo','📸打卡'],theatre:['t-must','音乐剧'],royal:['t-free','皇家'],shopping:['t-book','购物']};
        const [cls,lb]=map[t]||['t-free',t];
        return `<span class="tag ${cls}">${lb}</span>`;
      }).join('');
      const linkHtml=a.link?`<a class="act-link" href="${a.link}" target="_blank">${a.linkText} →</a>`:'';
      return `<div class="activity-item">
        <div class="act-time">${a.time}</div>
        <div class="act-content">
          <div class="act-name">${a.name}</div>
          <div class="act-desc">${a.desc}</div>
          <div class="act-tags">${tagHtml}</div>
          ${linkHtml}
        </div>
      </div>`;
    }).join('');

    const restsHtml = `
      <div class="restaurant-section">
        <div class="rest-title">🍴 今日餐厅推荐</div>
        <div class="rest-grid">
          ${day.restaurants.map(r=>`
            <div class="rest-card">
              <div class="rest-name">${r.name}</div>
              <div class="rest-cuisine">${r.cuisine}</div>
              <div class="rest-dish">代表菜：${r.dish}</div>
              ${r.link?`<a href="${r.link}" target="_blank" class="rest-link">预约 / 菜单 →</a>`:'<span style="font-size:10px;color:var(--text-light)">walk-in</span>'}
            </div>
          `).join('')}
        </div>
      </div>
    `;

    return `
      <div class="day-card">
        <div class="day-header" onclick="toggleDay(${di})">
          <div class="day-num-badge">D${di+1}</div>
          <div class="day-info">
            <div class="day-name">${day.name}</div>
            <div class="day-sub">${day.sub}</div>
          </div>
          <div class="day-arrow" id="arr-${di}">▼</div>
        </div>
        <div class="day-body${di===0?' open':''}" id="db-${di}">
          ${photosHtml}
          ${icBanner}
          ${actsHtml}
          ${restsHtml}
        </div>
      </div>
    `;
  }).join('');

  document.getElementById('itinerarySection').style.display='block';
  document.getElementById('itinerarySection').innerHTML = `
    <div class="result-header">
      <div class="ribbon"><span>✨ 专属行程已生成 ✨</span></div>
      <div class="result-title">阳阳的伦敦5日行程</div>
      <div class="tag-chips">${chips}</div>
    </div>
    <div class="stats-row">
      <div class="stat-box"><div class="sn">5</div><div class="sl">天行程</div></div>
      <div class="stat-box"><div class="sn">25+</div><div class="sl">精选景点</div></div>
      <div class="stat-box"><div class="sn">20+</div><div class="sl">餐厅推荐</div></div>
    </div>
    ${daysHtml}
    <button class="btn-reset" onclick="resetAll()">🐾 重新规划</button>
  `;

  document.getElementById('itinerarySection').scrollIntoView({behavior:'smooth', block:'start'});
}

function toggleDay(idx){
  const body=document.getElementById('db-'+idx);
  const arr=document.getElementById('arr-'+idx);
  const isOpen=body.classList.contains('open');
  body.classList.toggle('open',!isOpen);
  arr.style.transform=isOpen?'rotate(0)':'rotate(180deg)';
}

function resetAll(){
  answers={};
  step=0;
  document.getElementById('quizCard').style.display='block';
  document.getElementById('itinerarySection').style.display='none';
  renderQ(0);
  renderDots();
  window.scrollTo({top:0,behavior:'smooth'});
}

// Set default dates
const today = new Date();
const fmt = d => d.toISOString().split('T')[0];
document.getElementById('arrivalDate').value = fmt(new Date(today.getFullYear(), today.getMonth()+1, 1));
document.getElementById('departureDate').value = fmt(new Date(today.getFullYear(), today.getMonth()+1, 6));

renderQ(0);
renderDots();
</script>
</body>
</html>
